        const warnX = st.tunnel.startX - 60 - st.scrollX;
        if (warnX > -20 && warnX < W) {
          const laneNames = ['TOP', 'MID', 'LOW'];
          ctx.fillStyle = this.frame % 20 < 10 ? '#FF990088' : '#FF990044';
          ctx.font = 'bold 8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('DUCK! ' + laneNames[st.tunnel.openLane], warnX, LANE_Y[st.tunnel.openLane] - 18);
        }
      }

      // Obstacles
      for (const obs of st.obstacles) {
        if (obs.hit) continue;
        const sx = obs.x - st.scrollX;
        if (sx > -30 && sx < W + 30) drawObstacle(ctx, sx, LANE_Y[obs.lane], obs.type, obs.w, obs.h);
      }

      // Rings (uncollected, behind player)
      for (const ring of st.rings) {
        if (ring.collected || ring.collectTimer > 0) continue;
        const sx = ring.x - st.scrollX;
        if (sx > -30 && sx < W + 30) drawRing(ctx, sx, LANE_Y[ring.lane], this.frame, false);
      }

      // Dark fairies
      for (const fairy of st.fairies) {
        if (!fairy.alive) continue;
        const sx = fairy.x - st.scrollX;
        if (sx > -20 && sx < W + 20) drawBlackFairy(ctx, sx, LANE_Y[fairy.lane], 12, this.frame);
      }

      // Diamonds
      for (const d of st.diamonds) {
        if (d.collected) continue;
        const sx = d.x - st.scrollX;
        if (sx > -20 && sx < W + 20) drawDiamond(ctx, sx, LANE_Y[d.lane], this.frame, d.color);
      }

      // Spells
      for (const spell of st.spells) {
        if (!spell.alive) continue;
        drawSpell(ctx, spell.x - st.scrollX, spell.y, this.frame);
      }

      // Player fairy
      drawFairy(ctx, PLAYER_X, p.y, hair.color, wing.color, outfit.color, this.frame,
        p.crouching, p.spinning, eye.color, shoe.color, accObj);

      // Rings being collected (in front of player, fading)
      for (const ring of st.rings) {
        if (!ring.collectTimer || ring.collectTimer <= 0) continue;
        const sx = ring.x - st.scrollX;
        if (sx < -30 || sx > W + 30) continue;
        const t = 1 - ring.collectTimer / 0.35;
        ctx.save();
        ctx.globalAlpha = 1 - t;
        ctx.translate(sx, LANE_Y[ring.lane]);
        ctx.scale(1 + t * 0.8, 1 + t * 0.8);
        ctx.translate(-sx, -LANE_Y[ring.lane]);
        drawRing(ctx, sx, LANE_Y[ring.lane], this.frame, false);
        ctx.restore();
      }

      // On-screen controls
      if (isMobile) {
        const mb = this.mobileButtons;
        if (pageNum === 2 || pageNum === 3) {
          const duckActive = p.crouching;
          drawButton(ctx, mb.duck.x, mb.duck.y, mb.duck.w, mb.duck.h, 'DUCK', duckActive ? '#FF88BB' : '#FFB5E8CC', '#FFF');
        }
        if (pageNum === 5) drawButton(ctx, mb.spin.x, mb.spin.y, mb.spin.w, mb.spin.h, 'SPIN', '#85E3FFCC', '#FFF');
        if (pageNum === 4) drawButton(ctx, mb.cast.x, mb.cast.y, mb.cast.w, mb.cast.h, 'CAST', '#FFD700CC', '#FFF');
      } else {
        drawButton(ctx, W - 50, 55, 40, 25, 'UP', '#D5AAFF88', '#FFF');
        drawButton(ctx, W - 50, 85, 40, 25, 'DOWN', '#D5AAFF88', '#FFF');
        if (pageNum === 2 || pageNum === 3) drawButton(ctx, W - 50, 120, 40, 25, 'DUCK', '#FFB5E888', '#FFF');
        if (pageNum === 5) drawButton(ctx, W - 50, 155, 40, 25, 'SPIN', '#85E3FF88', '#FFF');
        if (pageNum === 4) drawButton(ctx, W - 50, 190, 40, 25, 'CAST', '#FFD70088', '#FFF');
      }

      // Success overlay
      if (st.done) {
        ctx.fillStyle = '#FFD70033';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Nice!', W/2, H/2);
      }
    } else if (pageNum === 0) {
      // Welcome - floating fairy
      const bob = Math.sin(this.frame * 0.05) * 5;
      drawFairy(ctx, W/2, 140 + bob, hair.color, wing.color, outfit.color, this.frame, false, false,
        eye.color, shoe.color, accObj);
    } else if (pageNum === 7) {
      // Boss preview
      drawBoss(ctx, W/2 + 60, 140 + Math.sin(this.frame * 0.04) * 5, this.frame, 10, 10, 'IDLE');
      drawFairy(ctx, W/2 - 60, 140 + Math.sin(this.frame * 0.06) * 3, hair.color, wing.color, outfit.color, this.frame, false, false,
        eye.color, shoe.color, accObj);
    }

    drawParticles(ctx);

    // Instruction card at top
    ctx.fillStyle = '#FFFFFFCC';
    rrect(ctx, 20, 5, W - 80, 48, 10);
    ctx.fill();

    ctx.fillStyle = '#8B6AAA';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(page.title, 220, 22);

    ctx.fillStyle = '#666';
    ctx.font = '8px monospace';
    ctx.fillText(page.sub, 220, 35);

    if (page.hint && this.frame % 60 < 45) {
      ctx.fillStyle = '#D5AAFF';
      ctx.font = 'bold 7px monospace';
      ctx.fillText(page.hint, 220, 47);
    }

    // Page indicator
    ctx.fillStyle = '#AAA';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${pageNum + 1} / ${pages.length}`, W/2, H - 5);

    // Navigation
    const navW = isMobile ? 70 : 50, navH = isMobile ? 24 : 16;
    if (pageNum > 0) {
      drawButton(ctx, W / 2 - navW * 2 - 5, H - navH - 5, navW, navH, 'PREV', '#D5AAFF', '#FFF');
      if (Input.clickInRect(W / 2 - navW * 2 - 5, H - navH - 5, navW, navH) || Input.pressed('ArrowLeft')) {
        this.howToPlayPage--;
        this.initTutorialPage(this.howToPlayPage);
      }
    }
    if (pageNum < pages.length - 1) {
      drawButton(ctx, W / 2 + navW + 5, H - navH - 5, navW, navH, 'NEXT', '#D5AAFF', '#FFF');
      if (Input.clickInRect(W / 2 + navW + 5, H - navH - 5, navW, navH) || Input.pressed('ArrowRight')) {
        this.howToPlayPage++;
        this.initTutorialPage(this.howToPlayPage);
      }
    }

    drawButton(ctx, W / 2 - navW / 2, H - navH - 5, navW, navH, 'BACK', '#FF9999', '#FFF');
    if (Input.clickInRect(W / 2 - navW / 2, H - navH - 5, navW, navH) || Input.pressed('Escape')) {
      this.state = 'HOME';
    }
  },

  renderPlaying(ctx) {
    drawBackground(ctx, this.scrollX, this.frame, this.currentLevel);

    const p = this.player;
    const level = this.level;

    // Tunnels
    for (const t of level.tunnels) {
      drawTunnel(ctx, t.startX, t.endX, this.scrollX, t.openLane);
      // Warning sign before tunnel showing which lane
      const warnX = t.startX - 80 - this.scrollX;
      if (warnX > -20 && warnX < W) {
        const laneNames = ['TOP', 'MID', 'LOW'];
        ctx.fillStyle = this.frame % 20 < 10 ? '#FF990088' : '#FF990044';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('DUCK! ' + laneNames[t.openLane], warnX, LANE_Y[t.openLane] - 18);
      }
    }

    // Obstacles
    for (const obs of level.obstacles) {
      if (obs.hit) continue;
      const screenX = obs.x - this.scrollX;
      if (screenX < -30 || screenX > W + 30) continue;
      drawObstacle(ctx, screenX, LANE_Y[obs.lane], obs.type, obs.w, obs.h);
    }

    // Rings (behind player — uncollected ones)
    for (const ring of level.rings) {
      if (ring.collected || ring.collectTimer > 0) continue;
      const screenX = ring.x - this.scrollX;
      if (screenX < -30 || screenX > W + 30) continue;
      drawRing(ctx, screenX, LANE_Y[ring.lane], this.frame, false);
    }

    // Diamonds
    for (const d of level.diamonds) {
      if (d.collected) continue;
      const screenX = d.x - this.scrollX;
      if (screenX < -20 || screenX > W + 20) continue;
      drawDiamond(ctx, screenX, LANE_Y[d.lane], this.frame, d.color);
    }

    // Small fairies
    for (const fairy of level.smallFairies) {
      if (!fairy.alive) continue;
      const screenX = fairy.x - this.scrollX;
      if (screenX < -20 || screenX > W + 20) continue;
      drawBlackFairy(ctx, screenX, LANE_Y[fairy.lane], 12, this.frame);
    }

    // Spells
    for (const spell of this.spells) {
      if (!spell.alive) continue;
      drawSpell(ctx, spell.x - this.scrollX, spell.y, this.frame);
    }

    // Player
    if (this.freezeTimer > 0) {
      // Frozen effect
      ctx.fillStyle = '#88DDFF44';
      ctx.beginPath();
      ctx.arc(PLAYER_X, p.y, 18, 0, Math.PI * 2);
      ctx.fill();
    }
    drawFairy(ctx, PLAYER_X - p.knockback * 10, p.y, p.hairColor, p.wingColor, p.outfitColor,
      this.frame, p.crouching, p.spinning, p.eyeColor, p.shoeColor, p.accessory);

    // Rings being collected (drawn in front of player, fading out)
    for (const ring of level.rings) {
      if (!ring.collectTimer || ring.collectTimer <= 0) continue;
      const screenX = ring.x - this.scrollX;
      if (screenX < -30 || screenX > W + 30) continue;
      const t = 1 - ring.collectTimer / 0.35; // 0→1 as it fades
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.translate(screenX, LANE_Y[ring.lane]);
      ctx.scale(1 + t * 0.8, 1 + t * 0.8);
      ctx.translate(-screenX, -LANE_Y[ring.lane]);
      drawRing(ctx, screenX, LANE_Y[ring.lane], this.frame, false);
      ctx.restore();
    }

    // Particles
    drawParticles(ctx);

    // HUD
    this.renderHUD(ctx);

    // Freeze overlay
    if (this.freezeTimer > 0) {
      ctx.fillStyle = '#88DDFF22';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('FROZEN!', W/2, H/2 - 30);
      ctx.font = '10px monospace';
      ctx.fillText(Math.ceil(this.freezeTimer) + 's', W/2, H/2 - 15);
    }

    // Level complete flash
    if (this.levelCompleteTimer > 0) {
      const alpha = Math.min(1, this.levelCompleteTimer);
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL COMPLETE!', W/2, H/2);
    }

    // Progress bar (rounded)
    const progress = Math.min(1, (this.scrollX + PLAYER_X) / level.levelLength);
    ctx.fillStyle = '#00000044';
    rrect(ctx, 50, H - 8, W - 100, 4, 2);
    ctx.fill();
    if (progress > 0.01) {
      ctx.fillStyle = '#FFD700';
      rrect(ctx, 50, H - 8, (W - 100) * progress, 4, 2);
      ctx.fill();
    }
    // Position dot
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(50 + (W - 100) * progress, H - 6, 3, 0, Math.PI * 2);
    ctx.fill();
  },

  renderBoss(ctx) {
    drawBackground(ctx, this.frame * 0.2, this.frame, this.currentLevel);

    const p = this.player;
    const boss = this.bossState;

    // Boss arena atmosphere
    ctx.fillStyle = this.currentLevel === 11 ? '#001A0022' : '#2D002D22';
    ctx.fillRect(0, 0, W, H);

    // Dark particles around edges
    if (this.frame % 5 === 0) {
      const auraCol = this.currentLevel === 11 ? '#003300' : '#4A004A';
      spawnParticles(Math.random() * W, Math.random() < 0.5 ? 0 : H, auraCol, 1, 10, 1.0);
    }

    // Spells
    for (const spell of this.spells) {
      if (!spell.alive) continue;
      drawSpell(ctx, spell.x, spell.y, this.frame);
    }

    // Player
    drawFairy(ctx, PLAYER_X, p.y, p.hairColor, p.wingColor, p.outfitColor,
      this.frame, false, p.spinning, p.eyeColor, p.shoeColor, p.accessory);

    if (boss.dual) {
      // Level 11: dual shadow bosses
      const bossXGreen = W - 180;
      const bossXPurple = W - 100;
      for (let i = 0; i < boss.bosses.length; i++) {
        const b = boss.bosses[i];
        const bx = i === 0 ? bossXGreen : bossXPurple;
        if (!b.defeated) {
          drawShadowFairy(ctx, bx, b.y, this.frame, b.hp, b.maxHp, b.scheme);
        } else {
          // Defeated bubble
          const bubbleR = 16 + Math.sin(this.frame * 0.1 + i) * 2;
          ctx.fillStyle = b.scheme.eyeColor + '22';
          ctx.beginPath();
          ctx.arc(bx, b.y, bubbleR + 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = b.scheme.eyeColor + '88';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(bx, b.y, bubbleR, 0, Math.PI * 2);
          ctx.stroke();
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.4;
          drawShadowFairy(ctx, bx, b.y, this.frame, 0, b.maxHp, b.scheme);
          ctx.globalAlpha = 1;
        }
      }

      if (boss.allDefeated) {
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SHADOWS CAPTURED!', W/2, 40);
      }
    } else {
      // Level 10: single boss
      if (!boss.defeated) {
        drawBoss(ctx, W - 140, boss.y, this.frame, boss.hp, boss.maxHp, boss.state);
      } else {
        const bubbleR = 20 + Math.sin(this.frame * 0.1) * 3;
        ctx.fillStyle = '#FFB5E844';
        ctx.beginPath();
        ctx.arc(W - 140, boss.y, bubbleR + 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FFB5E8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(W - 140, boss.y, bubbleR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        drawBoss(ctx, W - 140, boss.y, this.frame, 0, 10, 'IDLE');
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('CAPTURED!', W/2, 40);
      }
    }

    // Particles
    drawParticles(ctx);

    // HUD
    this.renderHUD(ctx);

  },

  renderHUD(ctx) {
    const ts = isMobile ? 1.3 : 1; // text scale for mobile

    // Pause button (rounded)
    const pauseW = isMobile ? 40 : 30, pauseH = isMobile ? 20 : 15;
    ctx.fillStyle = '#FFFFFF88';
    rrect(ctx, 5, 5, pauseW, pauseH, 5);
    ctx.fill();
    ctx.fillStyle = '#666';
    ctx.font = `${Math.floor(8 * ts)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('| |', 5 + pauseW / 2, 5 + pauseH / 2 + 3);

    // Level number
    ctx.fillStyle = '#FFF';
    ctx.font = `bold ${Math.floor(9 * ts)}px monospace`;
    ctx.textAlign = 'left';
    ctx.fillText('LV ' + this.currentLevel, pauseW + 12, 5 + pauseH / 2 + 3);

    // Spell counter
    ctx.fillStyle = '#FFD700';
    ctx.font = `${Math.floor(8 * ts)}px monospace`;
    ctx.textAlign = 'right';
    ctx.fillText('SPELLS: ' + this.spellCount, isMobile ? W - 10 : W - 55, 5 + pauseH / 2 + 3);

    if (isMobile) {
      // Mobile: large buttons at bottom of screen
      const mb = this.mobileButtons;
      const p = this.player;

      // DUCK button (left side, hold to crouch)
      const duckActive = p.crouching;
      const duckColor = duckActive ? '#FF88BB' : '#FFB5E8CC';
      drawButton(ctx, mb.duck.x, mb.duck.y, mb.duck.w, mb.duck.h, 'DUCK', duckColor, '#FFF');
      if (duckActive) {
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2;
        rrect(ctx, mb.duck.x, mb.duck.y, mb.duck.w, mb.duck.h, 6);
        ctx.stroke();
        ctx.lineWidth = 1;
      }

      // CAST button (right side)
      drawButton(ctx, mb.cast.x, mb.cast.y, mb.cast.w, mb.cast.h, 'CAST', '#FFD700CC', '#FFF');

      // SPIN button (above cast)
      const spinReady = p.spinCooldown <= 0;
      const spinColor = spinReady ? '#85E3FFCC' : '#85E3FF44';
      drawButton(ctx, mb.spin.x, mb.spin.y, mb.spin.w, mb.spin.h, 'SPIN', spinColor, '#FFF');

      // Spin cooldown indicator (circular overlay)
      if (p.spinCooldown > 0) {
        const pct = p.spinCooldown / 3;
        ctx.fillStyle = '#00000044';
        ctx.beginPath();
        ctx.moveTo(mb.spin.x + mb.spin.w / 2, mb.spin.y + mb.spin.h / 2);
        ctx.arc(mb.spin.x + mb.spin.w / 2, mb.spin.y + mb.spin.h / 2, mb.spin.w / 2,
          -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      // Desktop: original small controls on right side
      drawButton(ctx, W - 50, 50, 40, 25, 'UP', '#D5AAFF88', '#FFF');
      drawButton(ctx, W - 50, 85, 40, 25, 'DOWN', '#D5AAFF88', '#FFF');
      drawButton(ctx, W - 50, 120, 40, 25, 'DUCK', '#FFB5E888', '#FFF');
      drawButton(ctx, W - 50, 155, 40, 25, 'SPIN', '#85E3FF88', '#FFF');
      drawButton(ctx, W - 50, 190, 40, 25, 'CAST', '#FFD70088', '#FFF');
    }
  },

  renderPause(ctx) {
    if (this.bossState && (this.currentLevel === 10 || this.currentLevel === 11)) {
      this.renderBoss(ctx);
    } else {
      this.renderPlaying(ctx);
    }

    ctx.fillStyle = '#00000088';
    ctx.fillRect(0, 0, W, H);

    const btnW = isMobile ? 140 : 100, btnH = isMobile ? 32 : 22;
    const ts = isMobile ? 1.3 : 1;
    drawTitle(ctx, 'PAUSED', H / 2 - 55, Math.floor(20 * ts), '#FFF');

    const bx = W / 2 - btnW / 2;
    const gap = btnH + 8;
    drawButton(ctx, bx, H / 2 - 20, btnW, btnH, 'RESUME', '#D5AAFF', '#FFF');
    drawButton(ctx, bx, H / 2 - 20 + gap, btnW, btnH, 'RESTART', '#FFB5E8', '#FFF');
    drawButton(ctx, bx, H / 2 - 20 + gap * 2, btnW, btnH, 'HOME', '#FF9999', '#FFF');

    if (Input.clickInRect(bx, H / 2 - 20, btnW, btnH) || Input.pressed('Escape')) {
      this.state = (this.currentLevel === 10 || this.currentLevel === 11) && this.bossState ? 'BOSS' : 'PLAYING';
    }
    if (Input.clickInRect(bx, H / 2 - 20 + gap, btnW, btnH)) {
      this.startLevel(this.currentLevel);
    }
    if (Input.clickInRect(bx, H / 2 - 20 + gap * 2, btnW, btnH)) {
      this.state = 'HOME';
    }
  },

  renderLevelComplete(ctx) {
    drawBackground(ctx, this.scrollX, this.frame, this.currentLevel);

    // Celebration particles
    if (this.frame % 3 === 0) {
      const colors = ['#FFB5E8', '#D5AAFF', '#85E3FF', '#FFD700', '#B5FFB5'];
      spawnParticles(Math.random() * W, Math.random() * H * 0.5, colors[Math.floor(Math.random() * colors.length)], 3, 30, 1.0);
    }
    drawParticles(ctx);

    // Card (rounded)
    ctx.fillStyle = '#FFFFFFDD';
    rrect(ctx, W/2 - 120, 40, 240, 150, 14);
    ctx.fill();

    ctx.fillStyle = '#8B6AAA';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL ' + this.currentLevel, W/2, 70);
    ctx.fillText('COMPLETE!', W/2, 90);

    // Diamonds earned
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('Diamonds earned:', W/2, 115);

    const dColors = this.currentLevel === 10 ? ['#88DDFF','#FFB5E8','#FFFFA0'] : ['#88DDFF','#FFB5E8'];
    for (let i = 0; i < dColors.length; i++) {
      drawDiamond(ctx, W/2 - 10 * (dColors.length-1)/2 + i * 15, 135, this.frame, dColors[i]);
    }

    const contW = isMobile ? 140 : 100, contH = isMobile ? 32 : 22;
    drawButton(ctx, W / 2 - contW / 2, 160, contW, contH, 'CONTINUE', '#D5AAFF', '#FFF');

    if (Input.clickInRect(W / 2 - contW / 2, 160, contW, contH) || Input.pressed('Space') || Input.pressed('Enter')) {
      SaveData.addDiamonds(this.diamondsEarned);
      if (this.currentLevel >= SaveData.data.unlockedLevel && this.currentLevel < 11) {
        SaveData.unlockNext();
      }
      this.state = 'HOME';
    }
  },

  renderVictory(ctx) {
    // Epic victory screen
    ctx.fillStyle = '#1a0a2e';
    ctx.fillRect(0, 0, W, H);

    // Celebration particles
    if (this.frame % 2 === 0) {
      const colors = ['#FFB5E8', '#D5AAFF', '#85E3FF', '#FFD700', '#B5FFB5', '#FFCFAB'];
      spawnParticles(Math.random() * W, H + 10, colors[Math.floor(Math.random() * colors.length)], 2, 50, 2.0);
    }
    drawParticles(ctx);

    // Big sparkly text
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU DID IT!', W/2, 50);

    ctx.fillStyle = '#FFB5E8';
    ctx.font = 'bold 14px monospace';
    if (this.currentLevel === 11) {
      ctx.fillText('The shadows are vanquished!', W/2, 75);
    } else {
      ctx.fillText('Fairylandia is saved!', W/2, 75);
    }

    // Fairy celebration
    const equipped = SaveData.data.equipped;
    const hair = COSMETICS.hair.find(c => c.id === equipped.hairId) || COSMETICS.hair[0];
    const wing = COSMETICS.wings.find(c => c.id === equipped.wingId) || COSMETICS.wings[0];
    const outfit = COSMETICS.outfits.find(c => c.id === equipped.outfitId) || COSMETICS.outfits[0];
    const vEye = COSMETICS.eyes.find(c => c.id === (equipped.eyeId || 'eye_0')) || COSMETICS.eyes[0];
    const vShoe = COSMETICS.shoes.find(c => c.id === (equipped.shoeId || 'shoe_0')) || COSMETICS.shoes[0];
    const vAcc = COSMETICS.accessories.find(c => c.id === (equipped.accId || 'acc_0')) || COSMETICS.accessories[0];
    drawFairy(ctx, W/2, 130 + Math.sin(this.frame * 0.08) * 5, hair.color, wing.color, outfit.color, this.frame, false, true, vEye.color, vShoe.color, { type: vAcc.type, color: vAcc.color });

    if (this.currentLevel === 11) {
      // Bubbles with both shadow fairies
      for (let i = 0; i < 2; i++) {
        const bx = W/2 + 50 + i * 40;
        const bubbleR = 12 + Math.sin(this.frame * 0.1 + i) * 2;
        const scheme = i === 0 ? SHADOW_SCHEMES.green : SHADOW_SCHEMES.purple;
        ctx.strokeStyle = scheme.eyeColor + '88';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(bx, 130, bubbleR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        drawBlackFairy(ctx, bx, 130, 6, this.frame);
        ctx.globalAlpha = 1;
      }
    } else {
      // Bubble with defeated boss
      const bubbleR = 15 + Math.sin(this.frame * 0.1) * 2;
      ctx.strokeStyle = '#FFB5E8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(W/2 + 60, 130, bubbleR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      drawBlackFairy(ctx, W/2 + 60, 130, 8, this.frame);
      ctx.globalAlpha = 1;
    }

    // Diamonds earned
    ctx.fillStyle = '#FFF';
    ctx.font = '10px monospace';
    ctx.fillText('You earned 3 diamonds!', W/2, 180);

    const vColors = ['#88DDFF','#FFB5E8','#FFFFA0'];
    for (let i = 0; i < 3; i++) {
      drawDiamond(ctx, W/2 - 15 + i * 15, 200, this.frame, vColors[i]);
    }

    const homeW = isMobile ? 140 : 100, homeH = isMobile ? 32 : 22;
    drawButton(ctx, W / 2 - homeW / 2, 225, homeW, homeH, 'HOME', '#D5AAFF', '#FFF');

    if (Input.clickInRect(W / 2 - homeW / 2, 225, homeW, homeH) || Input.pressed('Space') || Input.pressed('Enter')) {
      SaveData.addDiamonds(3);
      if (SaveData.data.unlockedLevel < 11) SaveData.data.unlockedLevel = 11;
      SaveData.save();
      this.state = 'HOME';
    }
  },
  // === CARNIVAL ===
  initCarnival() {
    // Generate NPC fairies
    this.carnivalNPCs = [];
    const npcColors = [
      { hair: '#FFB5E8', wing: '#D5AAFF', outfit: '#85E3FF' },
      { hair: '#B5FFB5', wing: '#FFB5E8', outfit: '#FFFFD1' },
      { hair: '#D5AAFF', wing: '#85E3FF', outfit: '#FFB5E8' },
      { hair: '#FFCFAB', wing: '#B5FFB5', outfit: '#D5AAFF' },
      { hair: '#85E3FF', wing: '#FFFFD1', outfit: '#FFCFAB' },
    ];
    for (let i = 0; i < 5; i++) {
      const c = npcColors[i];
      this.carnivalNPCs.push({
        x: 60 + Math.random() * (W - 120),
        y: 190 + Math.random() * 40,
        dir: Math.random() < 0.5 ? -1 : 1,
        hairColor: c.hair, wingColor: c.wing, outfitColor: c.outfit,
        speed: 10 + Math.random() * 15,
      });
    }
  },

  updateCarnival() {
    // Move NPC fairies
    for (const npc of this.carnivalNPCs) {
      npc.x += npc.dir * npc.speed * this.dt;
      if (npc.x < 30 || npc.x > W - 30) npc.dir *= -1;
    }
  },

  renderCarnival(ctx) {
    // Carnival background - bright pastel sky
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#E8D5F5');
    grad.addColorStop(0.6, '#FFE5EC');
    grad.addColorStop(1, '#C8E6C8');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#A8D8A8';
    ctx.fillRect(0, 220, W, 50);
    ctx.fillStyle = '#90C890';
    ctx.fillRect(0, 220, W, 2);

    // Carnival tent tops
    const tentColors = ['#FFB5E8', '#D5AAFF', '#85E3FF', '#FFFFD1', '#B5FFB5'];
    for (let i = 0; i < 5; i++) {
      const tx = 30 + i * 100;
      // Tent peak
      ctx.fillStyle = tentColors[i];
      ctx.beginPath();
      ctx.moveTo(tx, 80);
      ctx.lineTo(tx + 40, 40);
      ctx.lineTo(tx + 80, 80);
      ctx.closePath();
      ctx.fill();
      // Tent body
      ctx.fillStyle = tentColors[i] + 'AA';
      ctx.fillRect(tx + 5, 80, 70, 60);
      // Stripes
      ctx.fillStyle = '#FFFFFF44';
      for (let s = 0; s < 3; s++) {
        ctx.fillRect(tx + 5 + s * 24, 80, 12, 60);
      }
    }

    // Banner/bunting
    ctx.strokeStyle = '#FFB5E8';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(20, 35);
    for (let i = 0; i < 12; i++) {
      const fx = 20 + i * 40;
      ctx.quadraticCurveTo(fx + 20, 45, fx + 40, 35);
    }
    ctx.stroke();
    // Triangle flags
    const flagColors = ['#FFB5E8', '#85E3FF', '#FFFFD1', '#D5AAFF', '#B5FFB5'];
    for (let i = 0; i < 11; i++) {
      const fx = 30 + i * 40;
      ctx.fillStyle = flagColors[i % flagColors.length];
      ctx.beginPath();
      ctx.moveTo(fx, 35);
      ctx.lineTo(fx + 8, 50);
      ctx.lineTo(fx + 16, 35);
      ctx.closePath();
      ctx.fill();
    }

    // String lights
    if (this.frame % 20 < 10) {
      for (let i = 0; i < 15; i++) {
        ctx.fillStyle = flagColors[i % flagColors.length];
        ctx.beginPath();
        ctx.arc(20 + i * 32, 30, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Title
    ctx.fillStyle = '#8B6AAA';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CARNIVAL', W/2, 25);

    const ts = isMobile ? 1.3 : 1;

    // Attraction buttons (arranged in a grid)
    const btnW = isMobile ? 105 : 85, btnH = isMobile ? 28 : 22;
    const col1X = W/2 - btnW - 5, col2X = W/2 + 5;
    const row1Y = 145, rowGap = btnH + 6;

    drawButton(ctx, col1X, row1Y, btnW, btnH, 'COASTER 2\u2666', '#D5AAFF', '#FFF');
    drawButton(ctx, col2X, row1Y, btnW, btnH, 'HAUNTED 2\u2666', '#8B6AAA', '#FFF');
    drawButton(ctx, col1X, row1Y + rowGap, btnW, btnH, 'UNDERSEA 2\u2666', '#85E3FF', '#FFF');
    drawButton(ctx, col2X, row1Y + rowGap, btnW, btnH, 'ICE CREAM 2\u2666', '#FFB5E8', '#FFF');
    drawButton(ctx, W/2 - btnW/2, row1Y + rowGap * 2, btnW, btnH, 'BOTTLES', '#B5FFB5', '#FFF');

    // Diamond counter
    drawDiamond(ctx, W - 20, 15, this.frame, '#88DDFF');
    ctx.fillStyle = '#8B6AAA';
    ctx.font = `bold ${Math.floor(8 * ts)}px monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(SaveData.data.diamondBalance + '', W - 28, 18);

    // NPC fairies
    for (const npc of this.carnivalNPCs) {
      drawFairy(ctx, npc.x, npc.y, npc.hairColor, npc.wingColor, npc.outfitColor,
        this.frame, false, false, '#4A3728', null, { type: 'none' });
    }

    // Player fairy (standing in center)
    const equipped = SaveData.data.equipped;
    const hair = COSMETICS.hair.find(c => c.id === equipped.hairId) || COSMETICS.hair[0];
    const wing = COSMETICS.wings.find(c => c.id === equipped.wingId) || COSMETICS.wings[0];
    const outfit = COSMETICS.outfits.find(c => c.id === equipped.outfitId) || COSMETICS.outfits[0];
    const eye = COSMETICS.eyes.find(c => c.id === (equipped.eyeId || 'eye_0')) || COSMETICS.eyes[0];
    const shoe = COSMETICS.shoes.find(c => c.id === (equipped.shoeId || 'shoe_0')) || COSMETICS.shoes[0];
    const acc = COSMETICS.accessories.find(c => c.id === (equipped.accId || 'acc_0')) || COSMETICS.accessories[0];
    const bob = Math.sin(this.frame * 0.05) * 3;
    drawFairy(ctx, W/2, 120 + bob, hair.color, wing.color, outfit.color, this.frame, false, false,
      eye.color, shoe.color, { type: acc.type, color: acc.color });

    drawParticles(ctx);

    // Handle clicks
    if (Input.clickInRect(col1X, row1Y, btnW, btnH)) {
      if (SaveData.data.diamondBalance >= 2) {
        SaveData.addDiamonds(-2);
        this.carnivalRide = { type: 'coaster', timer: 0, scrollX: 0, duration: 10 };
        this.state = 'CARNIVAL_RIDE';
      }
    }
    if (Input.clickInRect(col2X, row1Y, btnW, btnH)) {
      if (SaveData.data.diamondBalance >= 2) {
        SaveData.addDiamonds(-2);
        this.carnivalRide = { type: 'haunted', timer: 0, scrollX: 0, duration: 10 };
        this.state = 'CARNIVAL_RIDE';
      }
    }
    if (Input.clickInRect(col1X, row1Y + rowGap, btnW, btnH)) {
      if (SaveData.data.diamondBalance >= 2) {
        SaveData.addDiamonds(-2);
        this.carnivalRide = { type: 'underwater', timer: 0, scrollX: 0, duration: 10 };
        this.state = 'CARNIVAL_RIDE';
      }
    }
    if (Input.clickInRect(col2X, row1Y + rowGap, btnW, btnH)) {
      if (SaveData.data.diamondBalance >= 2) {
        SaveData.addDiamonds(-2);
        this.carnivalIceCream = { licks: 0, rainbowTimer: 0, spinning: false, spinTimer: 0 };
        this.state = 'CARNIVAL_ICECREAM';
      }
    }
    if (Input.clickInRect(W/2 - btnW/2, row1Y + rowGap * 2, btnW, btnH)) {
      this.initBottleGame();
      this.state = 'CARNIVAL_BOTTLES';
    }

    // Back button
    const backW = isMobile ? 70 : 60, backH = isMobile ? 24 : 20;
    drawButton(ctx, 10, H - backH - 8, backW, backH, 'BACK', '#FF9999', '#FFF');
    if (Input.clickInRect(10, H - backH - 8, backW, backH) || Input.pressed('Escape')) {
      this.state = 'HOME';
    }
  },

  // === CARNIVAL RIDES ===
  updateCarnivalRide() {
    const ride = this.carnivalRide;
    if (!ride) return;
    ride.timer += this.dt;
    ride.scrollX += 80 * this.dt;

    // Sparkle particles during ride
    if (this.frame % 8 === 0) {
      const colors = ['#FFB5E8', '#D5AAFF', '#85E3FF', '#FFD700'];
      spawnParticles(Math.random() * W, Math.random() * H * 0.3, colors[Math.floor(Math.random() * colors.length)], 2, 20, 0.8);
    }

    if (ride.timer >= ride.duration) {
      this.state = 'CARNIVAL';
    }
    if (Input.pressed('Escape')) {
      this.state = 'CARNIVAL';
    }
  },

  renderCarnivalRide(ctx) {
    const ride = this.carnivalRide;
    if (!ride) return;
    const t = ride.timer;
    const sx = ride.scrollX;

    if (ride.type === 'coaster') {
      // Sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#D5E8FF');
      grad.addColorStop(1, '#FFE5EC');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Clouds
      ctx.fillStyle = '#FFFFFF88';
      for (let i = 0; i < 8; i++) {
        const cx = ((i * 100 - sx * 0.3) % (W + 60)) - 30;
        ctx.beginPath();
        ctx.ellipse(cx, 30 + i * 10, 25, 8, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Roller coaster track
      ctx.strokeStyle = '#8B6AAA';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let x = -20; x <= W + 20; x += 2) {
        const worldX = x + sx;
        const y = 140 + Math.sin(worldX * 0.008) * 50 + Math.sin(worldX * 0.02) * 20 + Math.cos(worldX * 0.005) * 30;
        if (x === -20) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Track supports
      ctx.strokeStyle = '#6B5A88';
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i++) {
        const x = ((i * 50 - sx * 1) % (W + 50)) - 25;
        const worldX = x + sx;
        const trackY = 140 + Math.sin(worldX * 0.008) * 50 + Math.sin(worldX * 0.02) * 20 + Math.cos(worldX * 0.005) * 30;
        ctx.beginPath();
        ctx.moveTo(x, trackY);
        ctx.lineTo(x, 250);
        ctx.stroke();
      }

      // Cart with fairy
      const cartWorldX = sx + W * 0.4;
      const cartX = W * 0.4;
      const cartY = 140 + Math.sin(cartWorldX * 0.008) * 50 + Math.sin(cartWorldX * 0.02) * 20 + Math.cos(cartWorldX * 0.005) * 30;
      // Cart body
      ctx.fillStyle = '#FFB5E8';
      rrect(ctx, cartX - 12, cartY - 10, 24, 14, 4);
      ctx.fill();
      // Wheels
      ctx.fillStyle = '#8B6AAA';
      ctx.beginPath(); ctx.arc(cartX - 7, cartY + 5, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cartX + 7, cartY + 5, 3, 0, Math.PI * 2); ctx.fill();

      // Fairy in cart
      const eq = SaveData.data.equipped;
      const hair = COSMETICS.hair.find(c => c.id === eq.hairId) || COSMETICS.hair[0];
      const wing = COSMETICS.wings.find(c => c.id === eq.wingId) || COSMETICS.wings[0];
      const outfit = COSMETICS.outfits.find(c => c.id === eq.outfitId) || COSMETICS.outfits[0];
      drawFairy(ctx, cartX, cartY - 18, hair.color, wing.color, outfit.color, this.frame, false, false, '#4A3728', null, { type: 'none' });

      // Stars flying by
      ctx.fillStyle = '#FFD700';
      for (let i = 0; i < 6; i++) {
        const starX = ((i * 90 - sx * 1.5 + 200) % (W + 40)) - 20;
        const starY = 20 + i * 30;
        ctx.beginPath(); ctx.arc(starX, starY, 2, 0, Math.PI * 2); ctx.fill();
      }

      // Title
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('ROLLER COASTER!', W/2, 20);

    } else if (ride.type === 'haunted') {
      // Dark castle interior
      ctx.fillStyle = '#2D1A3D';
      ctx.fillRect(0, 0, W, H);

      // Stone walls
      ctx.fillStyle = '#3D2A4D';
      for (let i = 0; i < 20; i++) {
        const bx = ((i * 30 - sx * 0.5) % (W + 30)) - 15;
        rrect(ctx, bx, 0, 25, H, 2);
        ctx.fill();
      }

      // Candles
      for (let i = 0; i < 6; i++) {
        const cx = ((i * 80 + 40 - sx * 0.3) % (W + 80)) - 40;
        // Candle body
        ctx.fillStyle = '#FFFFD1';
        ctx.fillRect(cx - 2, 50, 4, 15);
        // Flame
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(cx, 48, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FF8800';
        ctx.beginPath(); ctx.arc(cx, 46, 2, 0, Math.PI * 2); ctx.fill();
        // Glow
        ctx.fillStyle = '#FFD70022';
        ctx.beginPath(); ctx.arc(cx, 50, 20, 0, Math.PI * 2); ctx.fill();
      }

      // Ghosts (white floating blobs)
      for (let i = 0; i < 4; i++) {
        const gx = ((i * 130 + 60 - sx * 0.8) % (W + 100)) - 50;
        const gy = 80 + Math.sin(t * 2 + i) * 20;
        ctx.fillStyle = '#FFFFFF88';
        ctx.beginPath();
        ctx.ellipse(gx, gy, 12, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        // Ghost eyes
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(gx - 4, gy - 3, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(gx + 4, gy - 3, 2, 0, Math.PI * 2); ctx.fill();
        // Ghost mouth
        ctx.beginPath(); ctx.arc(gx, gy + 3, 3, 0, Math.PI); ctx.fill();
      }

      // Spiders (dangling)
      for (let i = 0; i < 3; i++) {
        const spx = ((i * 160 + 100 - sx * 0.6) % (W + 100)) - 50;
        const threadLen = 30 + Math.sin(t + i * 2) * 10;
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(spx, 0); ctx.lineTo(spx, threadLen); ctx.stroke();
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(spx, threadLen, 4, 0, Math.PI * 2); ctx.fill();
        // Spider legs
        for (let leg = 0; leg < 4; leg++) {
          const a = (leg / 4) * Math.PI - Math.PI / 2;
          ctx.beginPath();
          ctx.moveTo(spx + Math.cos(a) * 4, threadLen + Math.sin(a) * 4);
          ctx.lineTo(spx + Math.cos(a) * 8, threadLen + Math.sin(a) * 8 + 3);
          ctx.stroke();
        }
      }

      // Pumpkins
      for (let i = 0; i < 3; i++) {
        const px = ((i * 170 + 50 - sx * 0.7) % (W + 100)) - 50;
        ctx.fillStyle = '#FF8844';
        ctx.beginPath(); ctx.ellipse(px, 210, 12, 10, 0, 0, Math.PI * 2); ctx.fill();
        // Face
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.arc(px - 4, 207, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(px + 4, 207, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(px - 3, 213); ctx.lineTo(px, 210); ctx.lineTo(px + 3, 213); ctx.stroke();
        // Stem
        ctx.fillStyle = '#228B22';
        ctx.fillRect(px - 1, 198, 2, 4);
      }

      // Vampires (capes)
      for (let i = 0; i < 2; i++) {
        const vx = ((i * 220 + 180 - sx * 0.9) % (W + 100)) - 50;
        const vy = 130 + Math.sin(t * 1.5 + i * 3) * 15;
        // Cape
        ctx.fillStyle = '#4A0000CC';
        ctx.beginPath();
        ctx.moveTo(vx - 8, vy - 5);
        ctx.quadraticCurveTo(vx, vy + 20, vx + 8, vy - 5);
        ctx.closePath(); ctx.fill();
        // Head
        ctx.fillStyle = '#E8D8D8';
        ctx.beginPath(); ctx.arc(vx, vy - 8, 5, 0, Math.PI * 2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#FF0000';
        ctx.beginPath(); ctx.arc(vx - 2, vy - 9, 1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(vx + 2, vy - 9, 1, 0, Math.PI * 2); ctx.fill();
      }

      // Zombies (green)
      for (let i = 0; i < 2; i++) {
        const zx = ((i * 200 + 120 - sx * 0.5) % (W + 100)) - 50;
        ctx.fillStyle = '#88AA66';
        ctx.beginPath(); ctx.ellipse(zx, 190, 6, 10, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#99BB77';
        ctx.beginPath(); ctx.arc(zx, 178, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(zx - 2, 177, 1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(zx + 2, 177, 1, 0, Math.PI * 2); ctx.fill();
      }

      // Cactuses (why not!)
      for (let i = 0; i < 2; i++) {
        const cx = ((i * 250 + 200 - sx * 0.4) % (W + 100)) - 50;
        ctx.fillStyle = '#5A8A5A';
        ctx.fillRect(cx - 3, 195, 6, 25);
        ctx.fillRect(cx - 8, 200, 6, 4);
        ctx.fillRect(cx + 2, 205, 6, 4);
        // Spines
        ctx.fillStyle = '#FFFFD1';
        for (let s = 0; s < 4; s++) {
          ctx.fillRect(cx + 3, 196 + s * 5, 2, 1);
          ctx.fillRect(cx - 5, 199 + s * 4, 2, 1);
        }
      }

      // Cart on track
      const eq2 = SaveData.data.equipped;
      const h2 = COSMETICS.hair.find(c => c.id === eq2.hairId) || COSMETICS.hair[0];
      const w2 = COSMETICS.wings.find(c => c.id === eq2.wingId) || COSMETICS.wings[0];
      const o2 = COSMETICS.outfits.find(c => c.id === eq2.outfitId) || COSMETICS.outfits[0];
      ctx.fillStyle = '#6A4A8A';
      rrect(ctx, W/2 - 15, 230, 30, 16, 4);
      ctx.fill();
      drawFairy(ctx, W/2, 220, h2.color, w2.color, o2.color, this.frame, false, false, '#4A3728', null, { type: 'none' });

      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('HAUNTED CASTLE', W/2, 20);

    } else if (ride.type === 'underwater') {
      // Deep blue gradient
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#1A4A7A');
      grad.addColorStop(1, '#0A2A4A');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Plastic tube (semi-transparent walls)
      ctx.strokeStyle = '#88CCFF44';
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.moveTo(0, 60); ctx.lineTo(W, 60); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 210); ctx.lineTo(W, 210); ctx.stroke();
      // Tube interior glow
      ctx.fillStyle = '#88CCFF0A';
      ctx.fillRect(0, 60, W, 150);

      // Bubbles
      for (let i = 0; i < 15; i++) {
        const bx = ((i * 40 + sx * 0.2) % W);
        const by = 80 + (i * 37 + Math.sin(t * 2 + i) * 20) % 120;
        const br = 2 + (i % 3);
        ctx.strokeStyle = '#88CCFF66';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#88CCFF22';
        ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
      }

      // Fish (colorful)
      const fishColors = ['#FF8844', '#FFB5E8', '#85E3FF', '#B5FFB5', '#FFFFD1', '#FF6B6B'];
      for (let i = 0; i < 8; i++) {
        const fx = ((i * 70 - sx * 0.6 + 300) % (W + 60)) - 30;
        const fy = 90 + (i * 23) % 100;
        const fc = fishColors[i % fishColors.length];
        ctx.fillStyle = fc;
        // Fish body
        ctx.beginPath();
        ctx.ellipse(fx, fy, 8, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        // Tail
        ctx.beginPath();
        ctx.moveTo(fx + 8, fy);
        ctx.lineTo(fx + 14, fy - 4);
        ctx.lineTo(fx + 14, fy + 4);
        ctx.closePath(); ctx.fill();
        // Eye
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(fx - 3, fy - 1, 1, 0, Math.PI * 2); ctx.fill();
      }

      // Coral
      const coralColors = ['#FFB5E8', '#FF8844', '#D5AAFF'];
      for (let i = 0; i < 6; i++) {
        const cx = ((i * 90 + 30 - sx * 0.3) % (W + 60)) - 30;
        ctx.fillStyle = coralColors[i % coralColors.length];
        // Coral branches
        for (let b = 0; b < 3; b++) {
          ctx.beginPath();
          ctx.moveTo(cx + b * 6 - 6, 250);
          ctx.quadraticCurveTo(cx + b * 6 - 3 + Math.sin(b) * 3, 230, cx + b * 6 - 6 + Math.sin(b + 1) * 5, 215);
          ctx.lineWidth = 3; ctx.strokeStyle = coralColors[i % coralColors.length]; ctx.stroke();
        }
      }

      // Starfish
      for (let i = 0; i < 3; i++) {
        const sx2 = ((i * 160 + 80 - sx * 0.2) % (W + 60)) - 30;
        ctx.fillStyle = '#FFB5E8';
        ctx.beginPath();
        for (let p = 0; p < 5; p++) {
          const a = (p / 5) * Math.PI * 2 - Math.PI / 2;
          const r = p % 2 === 0 ? 6 : 3;
          ctx.lineTo(sx2 + Math.cos(a) * r, 240 + Math.sin(a) * r);
        }
        ctx.closePath(); ctx.fill();
      }

      // Seahorse
      const shx = ((200 - sx * 0.4) % (W + 60)) - 30;
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.ellipse(shx, 140, 4, 8, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath(); ctx.arc(shx - 1, 130, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(shx - 2, 129, 1, 0, Math.PI * 2); ctx.fill();

      // Fairy in tube cart
      const eq3 = SaveData.data.equipped;
      const h3 = COSMETICS.hair.find(c => c.id === eq3.hairId) || COSMETICS.hair[0];
      const w3 = COSMETICS.wings.find(c => c.id === eq3.wingId) || COSMETICS.wings[0];
      const o3 = COSMETICS.outfits.find(c => c.id === eq3.outfitId) || COSMETICS.outfits[0];
      ctx.fillStyle = '#88CCFF44';
      rrect(ctx, W/2 - 15, 125, 30, 16, 6);
      ctx.fill();
      drawFairy(ctx, W/2, 120, h3.color, w3.color, o3.color, this.frame, false, false, '#4A3728', null, { type: 'none' });

      ctx.fillStyle = '#88CCFF';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('UNDERWATER RIDE', W/2, 50);
    }

    drawParticles(ctx);

    // Progress bar
    const progress = Math.min(1, ride.timer / ride.duration);
    ctx.fillStyle = '#00000044';
    rrect(ctx, 50, H - 8, W - 100, 4, 2);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    rrect(ctx, 50, H - 8, (W - 100) * progress, 4, 2);
    ctx.fill();

    // Skip button
    const skipW = isMobile ? 60 : 50, skipH = isMobile ? 22 : 16;
    drawButton(ctx, W - skipW - 5, 5, skipW, skipH, 'SKIP', '#FF999988', '#FFF');
    if (Input.clickInRect(W - skipW - 5, 5, skipW, skipH)) {
      this.state = 'CARNIVAL';
    }
  },

  // === ICE CREAM ===
  updateCarnivalIceCream() {
    const ic = this.carnivalIceCream;
    if (!ic) return;

    if (ic.rainbowTimer > 0) {
      ic.rainbowTimer -= this.dt;
      if (ic.rainbowTimer <= 0) ic.spinning = false;
    }

    // Lick with L key or tap on ice cream area
    if (Input.pressed('KeyL') || Input.clickInRect(W/2 - 40, 60, 80, 120)) {
      ic.licks++;
      ic.rainbowTimer = 1.5;
      ic.spinning = true;
      spawnParticles(W/2, 100, '#FFB5E8', 8, 30, 0.5);
      spawnParticles(W/2, 100, '#FFD700', 5, 25, 0.4);
    }

    if (Input.pressed('Escape')) {
      this.state = 'CARNIVAL';
    }
  },

  renderCarnivalIceCream(ctx) {
    const ic = this.carnivalIceCream;
    if (!ic) return;

    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#FFE5EC');
    grad.addColorStop(1, '#E8D5F5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Ice cream truck in background
    ctx.fillStyle = '#FFB5E8';
    rrect(ctx, W/2 - 80, 170, 160, 70, 10);
    ctx.fill();
    ctx.fillStyle = '#FF88BB';
    rrect(ctx, W/2 - 75, 175, 150, 20, 6);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ICE CREAM', W/2, 188);
    // Wheels
    ctx.fillStyle = '#666';
    ctx.beginPath(); ctx.arc(W/2 - 50, 240, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(W/2 + 50, 240, 8, 0, Math.PI * 2); ctx.fill();

    // Ice cream cone (big, centered)
    const coneX = W/2, coneY = 115;
    // Cone
    ctx.fillStyle = '#DEB887';
    ctx.beginPath();
    ctx.moveTo(coneX - 15, coneY);
    ctx.lineTo(coneX, coneY + 40);
    ctx.lineTo(coneX + 15, coneY);
    ctx.closePath(); ctx.fill();
    // Waffle pattern
    ctx.strokeStyle = '#C8A060';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(coneX - 13 + i * 3, coneY + 2);
      ctx.lineTo(coneX - 3 + i * 1, coneY + 35);
      ctx.stroke();
    }

    // Scoops (pastel colors, stacked)
    const scoopColors = ['#FFB5E8', '#85E3FF', '#B5FFB5'];
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = scoopColors[i];
      ctx.beginPath();
      ctx.arc(coneX, coneY - 5 - i * 12, 14, 0, Math.PI * 2);
      ctx.fill();
      // Highlight
      ctx.fillStyle = '#FFFFFF66';
      ctx.beginPath();
      ctx.arc(coneX - 4, coneY - 8 - i * 12, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Sprinkles on top scoop
    const sprinkleColors = ['#FFD700', '#FF6B6B', '#D5AAFF', '#FFFFD1'];
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = sprinkleColors[i % sprinkleColors.length];
      const sx = coneX - 10 + Math.sin(i * 1.7) * 10;
      const sy = coneY - 25 + Math.cos(i * 1.3) * 8;
      ctx.fillRect(sx, sy, 2, 1);
    }

    // Fairy
    const equipped = SaveData.data.equipped;
    const hair = COSMETICS.hair.find(c => c.id === equipped.hairId) || COSMETICS.hair[0];
    const wing = COSMETICS.wings.find(c => c.id === equipped.wingId) || COSMETICS.wings[0];
    const outfit = COSMETICS.outfits.find(c => c.id === equipped.outfitId) || COSMETICS.outfits[0];
    const eye = COSMETICS.eyes.find(c => c.id === (equipped.eyeId || 'eye_0')) || COSMETICS.eyes[0];
    const shoe = COSMETICS.shoes.find(c => c.id === (equipped.shoeId || 'shoe_0')) || COSMETICS.shoes[0];
    const acc = COSMETICS.accessories.find(c => c.id === (equipped.accId || 'acc_0')) || COSMETICS.accessories[0];

    // Rainbow effect when licking
    let fairyHair = hair.color, fairyWing = wing.color, fairyOutfit = outfit.color;
    if (ic.rainbowTimer > 0) {
      const rPhase = this.frame * 0.15;
      const rainbowColors = ['#FFB5E8', '#D5AAFF', '#85E3FF', '#B5FFB5', '#FFFFD1', '#FFCFAB'];
      fairyHair = rainbowColors[Math.floor(rPhase) % rainbowColors.length];
      fairyWing = rainbowColors[Math.floor(rPhase + 2) % rainbowColors.length];
      fairyOutfit = rainbowColors[Math.floor(rPhase + 4) % rainbowColors.length];
    }

    const bob = Math.sin(this.frame * 0.05) * 3;
    drawFairy(ctx, W/2 + 60, 100 + bob, fairyHair, fairyWing, fairyOutfit, this.frame,
      false, ic.spinning, eye.color, shoe.color, { type: acc.type, color: acc.color });

    drawParticles(ctx);

    // Instructions
    ctx.fillStyle = '#8B6AAA';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ICE CREAM TIME!', W/2, 20);

    ctx.fillStyle = '#666';
    ctx.font = '9px monospace';
    if (isMobile) {
      ctx.fillText('Tap the ice cream to lick!', W/2, 35);
    } else {
      ctx.fillText('Press L to lick!', W/2, 35);
    }

    // Lick counter
    ctx.fillStyle = '#FFB5E8';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('Licks: ' + ic.licks, W/2, 160);

    // Back button
    const backW = isMobile ? 70 : 60, backH = isMobile ? 24 : 20;
    drawButton(ctx, 10, H - backH - 8, backW, backH, 'DONE', '#FF9999', '#FFF');
    if (Input.clickInRect(10, H - backH - 8, backW, backH) || Input.pressed('Escape')) {
      this.state = 'CARNIVAL';
    }
  },

  // === BOTTLE GAME ===
  initBottleGame() {
    // Pyramid: 3 bottom, 2 middle, 1 top
    const bottles = [];
    const baseX = W * 0.65, baseY = 170;
    const bw = 14, bh = 20, gap = 3;
    // Bottom row
    for (let i = 0; i < 3; i++) {
      bottles.push({ x: baseX - (bw + gap) + i * (bw + gap), y: baseY, w: bw, h: bh, hit: false, vy: 0, falling: false });
    }
    // Middle row
    for (let i = 0; i < 2; i++) {
      bottles.push({ x: baseX - (bw + gap) / 2 + i * (bw + gap), y: baseY - bh - 2, w: bw, h: bh, hit: false, vy: 0, falling: false });
    }
    // Top
    bottles.push({ x: baseX, y: baseY - (bh + 2) * 2, w: bw, h: bh, hit: false, vy: 0, falling: false });

    this.carnivalBottles = {
      bottles,
      spells: [],
      spellCount: 8,
      aiming: 1, // 0=top, 1=mid, 2=bottom
      won: false,
      wonTimer: 0,
      fairyPlushy: false,
    };
  },

  updateCarnivalBottles() {
    const bg = this.carnivalBottles;
    if (!bg) return;

    if (bg.won) {
      bg.wonTimer += this.dt;
      if (bg.wonTimer > 3 && (Input.pressed('Space') || Input.pressed('Enter') || Input.clicks.length > 0)) {
        this.state = 'CARNIVAL';
      }
      return;
    }

    // Aim
    if (Input.pressed('ArrowUp') || Input.pressed('KeyW') || Input.hasSwipe('up')) {
      if (bg.aiming > 0) bg.aiming--;
    }
    if (Input.pressed('ArrowDown') || Input.pressed('KeyS') || Input.hasSwipe('down')) {
      if (bg.aiming < 2) bg.aiming++;
    }

    // Cast
    const castTrig = Input.pressed('Space') ||
      (isMobile && Input.clickInRect(W - 70, H - 70, 60, 60)) ||
      (isMobile && Input.hasSwipe('right'));
    if (castTrig && bg.spellCount > 0) {
      bg.spellCount--;
      const aimY = LANE_Y[bg.aiming];
      bg.spells.push({ x: PLAYER_X + 15, y: aimY, speed: 200, alive: true });
      spawnParticles(PLAYER_X + 15, aimY, '#FFD700', 5, 40, 0.3);
    }

    // Update spells
    for (const spell of bg.spells) {
      if (!spell.alive) continue;
      spell.x += spell.speed * this.dt;
      if (spell.x > W + 20) spell.alive = false;

      // Hit detection
      for (const bottle of bg.bottles) {
        if (bottle.hit) continue;
        if (Math.abs(spell.x - bottle.x) < bottle.w / 2 + 5 &&
            Math.abs(spell.y - bottle.y) < bottle.h / 2 + 5) {
          bottle.hit = true;
          bottle.falling = true;
          bottle.vy = -30;
          spell.alive = false;
          spawnParticles(bottle.x, bottle.y, '#D5AAFF', 8, 40, 0.5);
          this.shakeTimer = 0.1;
          this.shakeIntensity = 2;
          break;
        }
      }
    }
    bg.spells = bg.spells.filter(s => s.alive);

    // Falling bottles
    for (const bottle of bg.bottles) {
      if (bottle.falling) {
        bottle.vy += 150 * this.dt;
        bottle.y += bottle.vy * this.dt;
        bottle.x += (Math.random() - 0.5) * 2;
      }
    }

    // Check win
    if (bg.bottles.every(b => b.hit) && !bg.won) {
      bg.won = true;
      bg.wonTimer = 0;
      bg.fairyPlushy = true;
      spawnParticles(W * 0.65, 150, '#FFD700', 20, 60, 1.0);
      spawnParticles(W * 0.65, 150, '#FFB5E8', 15, 50, 0.8);
    }

    // Out of spells, not all hit = can restart
    if (bg.spellCount <= 0 && bg.spells.length === 0 && !bg.won) {
      // Auto-restart after a moment
    }

    if (Input.pressed('Escape')) {
      this.state = 'CARNIVAL';
    }
  },

  renderCarnivalBottles(ctx) {
    const bg = this.carnivalBottles;
    if (!bg) return;

    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#E8D5F5');
    grad.addColorStop(1, '#FFE5EC');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Booth
    ctx.fillStyle = '#D5AAFF';
    rrect(ctx, W * 0.45, 60, W * 0.45, 160, 10);
    ctx.fill();
    // Booth stripes
    ctx.fillStyle = '#FFFFFF33';
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(W * 0.45 + i * 42, 60, 21, 160);
    }
    // Counter
    ctx.fillStyle = '#8B6AAA';
    ctx.fillRect(W * 0.43, 195, W * 0.49, 8);

    // Shelf for bottles
    ctx.fillStyle = '#B8A0D0';
    ctx.fillRect(W * 0.5, 190, W * 0.3, 3);
    ctx.fillRect(W * 0.52, 168, W * 0.26, 3);
    ctx.fillRect(W * 0.57, 146, W * 0.16, 3);

    for (const bottle of bg.bottles) {
      if (bottle.y > H + 30) continue; // off screen

        // Bottle shape
        rrect(ctx, bottle.x - bottle.w/2, bottle.y - bottle.h/2, bottle.w, bottle.h, 3);

        ctx.fillStyle = '#88DDFF';

        rrect(ctx, bottle.x - bottle.w/2 + 2, bottle.y - 3, bottle.w - 4, 8, 2);
        ctx.fill();
      }
    }

    // Spells in flight
    for (const spell of bg.spells) {

      drawSpell(ctx, spell.x, spell.y, this.frame);

    ctx.moveTo(PLAYER_X + 20, aimY);
    ctx.lineTo(W * 0.5, aimY);
    ctx.stroke();
    ctx.setLineDash([]);
    // Crosshair
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(PLAYER_X + 15, aimY, 5, 0, Math.PI * 2); ctx.stroke();

    // Player fairy
    const equipped = SaveData.data.equipped;
    const hair = COSMETICS.hair.find(c => c.id === equipped.hairId) || COSMETICS.hair[0];
    const wing = COSMETICS.wings.find(c => c.id === equipped.wingId) || COSMETICS.wings[0];
    const outfit = COSMETICS.outfits.find(c => c.id === equipped.outfitId) || COSMETICS.outfits[0];
    const eye = COSMETICS.eyes.find(c => c.id === (equipped.eyeId || 'eye_0')) || COSMETICS.eyes[0];
    const shoe = COSMETICS.shoes.find(c => c.id === (equipped.shoeId || 'shoe_0')) || COSMETICS.shoes[0];
    const acc = COSMETICS.accessories.find(c => c.id === (equipped.accId || 'acc_0')) || COSMETICS.accessories[0];
    drawFairy(ctx, PLAYER_X, aimY, hair.color, wing.color, outfit.color, this.frame,
      false, false, eye.color, shoe.color, { type: acc.type, color: acc.color });

    // NPC fairy running the booth
    drawFairy(ctx, W * 0.85, 185, '#FFCFAB', '#B5FFB5', '#D5AAFF', this.frame, false, false, '#4A3728', null, { type: 'none' });

    drawParticles(ctx);

    // HUD
    ctx.fillStyle = '#8B6AAA';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('KNOCK THE BOTTLES!', W/2, 20);

    ctx.fillStyle = '#FFD700';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Spells: ' + bg.spellCount, 10, 15);

    ctx.fillStyle = '#666';
    ctx.font = '8px monospace';
    if (isMobile) {
      ctx.fillText('Swipe UP/DOWN aim, tap CAST', 10, 28);
    } else {
      ctx.fillText('UP/DOWN aim, SPACE cast', 10, 28);
    }

    // Mobile cast button
    if (isMobile) {
      drawButton(ctx, W - 70, H - 70, 60, 60, 'CAST', '#FFD700CC', '#FFF');
    }

    // Win screen
    if (bg.won) {
      ctx.fillStyle = '#FFD70033';
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = '#FFFFFFDD';
      rrect(ctx, W/2 - 100, H/2 - 50, 200, 100, 12);
      ctx.fill();

      ctx.fillStyle = '#8B6AAA';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('YOU WIN!', W/2, H/2 - 20);

      // Fairy plushy prize
      ctx.fillStyle = '#FFB5E8';
      ctx.beginPath(); ctx.ellipse(W/2, H/2 + 10, 12, 15, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(W/2, H/2 - 5, 8, 0, Math.PI * 2); ctx.fill();
      // Plushy eyes
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(W/2 - 3, H/2 - 7, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(W/2 + 3, H/2 - 7, 1.5, 0, Math.PI * 2); ctx.fill();
      // Plushy wings
      ctx.fillStyle = '#D5AAFF88';
      ctx.beginPath(); ctx.ellipse(W/2 - 10, H/2, 6, 4, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(W/2 + 10, H/2, 6, 4, 0.3, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#666';
      ctx.font = '9px monospace';
      ctx.fillText('A fairy plushy!', W/2, H/2 + 35);
    }

    // Restart if out of spells and didn't win
    if (bg.spellCount <= 0 && bg.spells.length === 0 && !bg.won) {
      ctx.fillStyle = '#00000066';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Try again!', W/2, H/2 - 10);

      const retryW = isMobile ? 100 : 80, retryH = isMobile ? 28 : 22;
      drawButton(ctx, W/2 - retryW/2, H/2 + 5, retryW, retryH, 'RETRY', '#D5AAFF', '#FFF');
      drawButton(ctx, W/2 - retryW/2, H/2 + 5 + retryH + 5, retryW, retryH, 'BACK', '#FF9999', '#FFF');

      if (Input.clickInRect(W/2 - retryW/2, H/2 + 5, retryW, retryH)) {
        this.initBottleGame();
      }
      if (Input.clickInRect(W/2 - retryW/2, H/2 + 5 + retryH + 5, retryW, retryH)) {
        this.state = 'CARNIVAL';
      }
    }

    // Back button (only show when game active)
    if (!bg.won && bg.spellCount > 0) {
      const backW = isMobile ? 70 : 60, backH = isMobile ? 24 : 20;
      drawButton(ctx, 10, H - backH - 8, backW, backH, 'BACK', '#FF9999', '#FFF');
      if (Input.clickInRect(10, H - backH - 8, backW, backH)) {
        this.state = 'CARNIVAL';
      }
    }
  },
};

// --- INIT ---
window.onload = () => {
  Game.init();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
};
</script>
</body>
</html>
